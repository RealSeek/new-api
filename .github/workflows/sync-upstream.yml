name: Sync Upstream

on:
  schedule:
    # 每天北京时间凌晨 4:00 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/QuantumNous/new-api.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main

          echo "::group::尝试合并上游分支"
          if ! git merge upstream/main --no-edit; then
            echo "::endgroup::"
            echo "::error::❌ Merge 失败！以下是详细信息："
            echo ""
            echo "=== Git 状态 ==="
            git status
            echo ""
            echo "=== 冲突文件列表 ==="
            git diff --name-only --diff-filter=U || echo "无法获取冲突文件列表"
            echo ""
            echo "=== 冲突详情 ==="
            git diff --diff-filter=U || echo "无法获取冲突详情"
            exit 1
          fi
          echo "::endgroup::"
          echo "✅ Merge 成功完成"

      - name: Push changes
        run: git push origin main
